artifact_contract_version: 0.1.0
slices:
- id: S-001
  title: Wrapper and artifact readability guardrails
  linked_requirements:
  - FR-001
  - FR-002
  - FR-003
  - FR-007
  linked_acceptance_criteria:
  - AC-001
  - AC-005
  linked_adrs: []
  linked_contracts: []
  dependencies: []
  priority: 1
  complexity: 4
  critical_path: true
  rationale: Prove stale public raw findings cannot recur silently.
  files_owned:
  - tests/feature_pipeline/test_artifact_formatting.py
  - .ai/knowledge/architecture-overview.md
  expected_touchpoints:
  - .gitignore
  - .agents/pipeline-core/scripts/featurectl.py
  - .agents/pipeline-core/scripts/pipelinebench.py
  test_strategy: Add failing tests for real wrapper execution and broad readable artifacts.
  tdd_commands:
    red: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
    green: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
  verification_commands:
  - python .agents/pipeline-core/scripts/featurectl.py --help
  - python .agents/pipeline-core/scripts/pipelinebench.py --help
  - python .agents/pipeline-core/scripts/pipelinebench.py list-scenarios
  - python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
  review_focus:
  - wrapper commands produce output
  - broad scans skip raw evidence command/output logs
  evidence_status: complete
  status: complete
  iteration_budget: 3
  rollback_point: pre-slice git state
  independent_verification: direct wrapper command execution
  failure_triage_notes: classify failures as stale review, formatting regression, or test overreach
  parallelizable: false
  file_ownership:
  - tests/feature_pipeline/test_artifact_formatting.py
  conflict_risk: medium
  dependency_notes: First slice because it validates the public raw claims.
  scope_confidence: high
  tdd:
    failing_test_file: tests/feature_pipeline/test_artifact_formatting.py
    red_command: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
    expected_failure: wrapper/help or broad readability guard missing
    green_command: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
