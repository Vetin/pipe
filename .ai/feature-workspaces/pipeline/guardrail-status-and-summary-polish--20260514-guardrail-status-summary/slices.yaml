artifact_contract_version: 0.1.0
feature_key: pipeline/guardrail-status-and-summary-polish
slices:
  - id: S-001
    title: Guardrail status and artifact readability tests
    linked_requirements:
      - FR-001
      - FR-002
      - FR-006
    linked_acceptance_criteria:
      - AC-001
      - AC-002
      - AC-006
    linked_adrs:
      - ADR-009
    linked_contracts: []
    dependencies: []
    priority: 1
    complexity: 3
    critical_path: true
    parallelizable: false
    file_ownership:
      - .ai/knowledge/pipeline-guardrails-status.md
      - .ai/knowledge/pipeline-backlog.md
      - .ai/knowledge/architecture-overview.md
      - .ai/knowledge/module-map.md
      - .ai/knowledge/integration-map.md
      - tests/feature_pipeline/test_artifact_formatting.py
    conflict_risk: medium
    dependency_notes: Shared knowledge updates should land before final status claims.
    expected_touchpoints:
      - public raw status documentation
      - YAML no-blank-line tests
      - backlog readability tests
    scope_confidence: high
    test_strategy: Add artifact formatting tests before adding the status doc and knowledge changes.
    tdd:
      failing_test_file: tests/feature_pipeline/test_artifact_formatting.py
      red_command: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
      expected_failure: missing guardrail status document or stricter readability assertions.
      green_command: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
    verification_commands:
      - python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q
      - python .agents/pipeline-core/scripts/pipelinebench.py check-public-raw --min-lines 5
    review_focus:
      - status claims are command-backed
      - YAML tests do not reject raw command-output artifacts
    evidence_status: pending
    status: pending
    iteration_budget: 3
    rollback_point: pre-slice git state
    independent_verification: Inspect status document and run artifact formatting tests.
    failure_triage_notes: Separate formatting failures from network raw-check failures.
