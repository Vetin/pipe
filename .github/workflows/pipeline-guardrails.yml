name: Pipeline Guardrails

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml

      - name: Verify CLI wrappers
        run: |
          python .agents/pipeline-core/scripts/featurectl.py --help
          python .agents/pipeline-core/scripts/pipelinebench.py --help

      - name: Compile pipeline scripts
        run: python -m compileall .agents/pipeline-core/scripts

      - name: Run artifact formatting guardrails
        run: python -m pytest tests/feature_pipeline/test_artifact_formatting.py -q

      - name: Check public raw artifacts
        run: >
          python .agents/pipeline-core/scripts/pipelinebench.py check-public-raw
          --base-url
          https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}
          --min-lines 5

  pipeline-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pyyaml

      - name: Run deterministic feature pipeline suite
        run: python -m pytest tests/feature_pipeline -q
